<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

<body>
    <header><h1>CWS JS libary</h1></header>
    <nav>
        <div id="main">main</div>
        <div id="downlode">download</div>
        <div id="try">try yourself</div>
    </nav>
    <main>
        <div id="mainDownlode">
            Here you can download my libary 
            <a href="./download/CWS.js">CWS 1.0.0</a>
            <a href="./download/CWS.1.0.1.js">CWS 1.0.1</a>
            <a href="./download/CWS.1.0.2.js">CWS 1.0.2</a>
            <a href="./download/CWS.1.0.3.js">CWS 1.0.3</a>

        <div id="mainMain">
            My libary CWS is for working with canvas and making pixel arts like this 
            <canvas id="heartArt"></canvas> 
        </div>
        <div id="mainTry">
            <textarea id="code" rows="10" cols="50">
                let sprite = CWS.createSprite(CWS.spriteGalery.rocket, 5)

                canvas.width = 200
                canvas.height = 200

                CWS.drawSprite(sprite, canvas)
            </textarea>

            <br>

            <button onclick="runCode()" id="runBtn">Run</button>

            <br><br>

            <canvas id="canvas" width="200" height="200"></canvas>
        </div>
    </main>
